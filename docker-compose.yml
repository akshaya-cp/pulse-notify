services:
  postgres:
    image: postgres:16-alpine
    container_name: pulse-notify-postgres
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: pulse
      POSTGRES_DB: pulse_notify
    ports:
      - "5432:5432"
    volumes:
      - pulse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse_notify"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pulse-notify-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Single-broker Kafka in KRaft mode (no ZooKeeper required).
  kafka:
    image: bitnami/kafka:3.7
    container_name: pulse-notify-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: "broker,controller"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - pulse_kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build:
      context: .
    container_name: pulse-notify-api
    command: ["api"]
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      HTTP_PORT: "8080"
      LOG_LEVEL: info
      DATABASE_URL: postgres://pulse:pulse@postgres:5432/pulse_notify?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: notifications
      JWT_SECRET: dev-only-change-this-secret-before-production-use
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
      RATE_LIMIT_REQUESTS: "100"
      RATE_LIMIT_WINDOW: 1m
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  worker:
    build:
      context: .
    container_name: pulse-notify-worker
    command: ["worker"]
    environment:
      APP_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgres://pulse:pulse@postgres:5432/pulse_notify?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKERS: kafka:9092
      KAFKA_TOPIC: notifications
      KAFKA_GROUP_ID: pulse-notify-workers
      JWT_SECRET: dev-only-change-this-secret-before-production-use
      WORKER_CONCURRENCY: "4"
      WORKER_MAX_RETRIES: "3"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  pulse_postgres_data:
  pulse_kafka_data:
